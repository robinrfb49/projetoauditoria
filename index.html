<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas Analíticas e Visão Geral - Labdiag</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
        .ticker-container { overflow: hidden; white-space: nowrap; }
        .ticker-conteudo { display: inline-block; animation: ticker 40s linear infinite; }
        .ticker-container:hover .ticker-conteudo { animation-play-state: paused; }
        .neon-text-green { text-shadow: 0 0 6px rgba(52, 211, 153, 0.6); }
        .neon-text-red { text-shadow: 0 0 6px rgba(248, 113, 113, 0.6); }

        /* Classes do Painel de Tarefas */
        .monday-select { appearance: none; -webkit-appearance: none; text-align: center; font-weight: 800; color: white; cursor: pointer; transition: all 0.2s ease; border: none; }
        .status-working { background-color: #fdab3d; }
        .status-done { background-color: #00c875; }
        .status-stuck { background-color: #e2445c; }
        .status-backlog { background-color: #797e93; }
        
        .priority-high { background-color: #ef4444; }
        .priority-medium { background-color: #a25ddc; }
        .priority-low { background-color: #55596e; }

        /* Cores de Instância */
        .instance-1st { background-color: #0284c7; } /* Operacional */
        .instance-2nd { background-color: #0f766e; } /* Tático */
        .instance-3rd { background-color: #1e1b4b; } /* Estratégico - Robson Farias */

        /* Estilos avançados para uma impressão limpa e com alto contraste */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-scheme: light !important;
            }
            body { background: #ffffff !important; color: #000000 !important; }
            .w-64, header, .bg-slate-50, .no-print, button, input, select, .ticker-container { display: none !important; }
            .flex-1, #estrutura-sistema, #corpo-principal { width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; display: block !important; height: auto !important;}
            main { padding: 0 !important; max-width: 100% !important; }
            .bg-white, .rounded-2xl, .border, .shadow-sm, .shadow-md { border: none !important; box-shadow: none !important; background: transparent !important; }
            table { font-size: 11px !important; width: 100% !important; border-collapse: collapse !important; color: #000000 !important; }
            th { background-color: #0f172a !important; color: #ffffff !important; padding: 8px !important; }
            td { color: #000000 !important; padding: 6px !important; border-bottom: 1px solid #e2e8f0 !important; }
            td span, td font, .font-mono, .text-slate-500, .text-slate-600, .text-slate-900 { color: #000000 !important; }
            .text-red-500, .text-red-600 { color: #850000 !important; font-weight: bold !important; }
            .text-blue-600, .text-blue-700 { color: #002d7a !important; font-weight: bold !important; }
            tr { page-break-inside: avoid !important; }
        }
    </style>
</head>
<body class="bg-slate-900 font-sans text-slate-800 min-h-screen flex items-center justify-center m-0" id="corpo-principal">

    <!-- Painel de Login de Segurança -->
    <div id="bloco-autenticacao" class="w-full max-w-md mx-4 transition-all duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl border border-slate-800/10">
            <div class="text-center mb-8">
                <div class="bg-blue-600 text-white font-bold text-2xl w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-md">LD</div>
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Acesso ao Labdiag</h2>
                <p class="text-sm text-slate-400 mt-1">Área estritamente restrita a administradores</p>
            </div>
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Utilizador</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-3.5 top-3 text-slate-400 text-sm"></i>
                        <input type="text" id="login-user" required class="w-full pl-10 pr-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-blue-500 bg-slate-50">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Palavra-passe</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-3 text-slate-400 text-sm"></i>
                        <input type="password" id="login-pass" required class="w-full pl-10 pr-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-blue-500 bg-slate-50">
                    </div>
                </div>
                <div id="erro-autenticacao" class="text-red-500 text-xs font-bold hidden text-center bg-red-50 py-2 rounded-lg border border-red-100 animate-pulse">
                    <i class="fa-solid fa-triangle-exclamation"></i> Credenciais incorretas. Acesso negado.
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-xl text-sm hover:bg-blue-700 transition-all cursor-pointer shadow-md mt-2">
                    <i class="fa-solid fa-right-to-bracket"></i> Verificar e Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- Container do Sistema Protegido -->
    <div id="estrutura-sistema" class="w-full h-screen flex overflow-hidden hidden bg-slate-50"></div>

    <template id="template-admin">
        <!-- Sidebar Principal Estável -->
        <div class="w-64 bg-slate-900 text-white flex flex-col justify-between p-5 border-r border-slate-800 no-print shrink-0">
            <div>
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-blue-600 p-2 rounded-lg text-white font-bold text-xl shadow-md">LD</div>
                    <span class="text-lg font-bold tracking-wider">LABDIAG</span>
                </div>
                <nav class="space-y-2">
                    <button onclick="alternarAba('aba-dashboard')" id="btn-aba-dashboard" class="w-full flex items-center gap-3 bg-slate-800 text-blue-400 px-4 py-3 rounded-lg font-medium text-left cursor-pointer">
                        <i class="fa-solid fa-chart-pie w-5"></i> Dashboard Central
                    </button>
                    <button onclick="alternarAba('aba-tarefas')" id="btn-aba-tarefas" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer">
                        <i class="fa-solid fa-list-check w-5"></i> Quadro de Tarefas
                    </button>
                    <button onclick="alternarAba('aba-contas')" id="btn-aba-contas" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer">
                        <i class="fa-solid fa-file-invoice-dollar w-5"></i> Lançar Faturas
                    </button>
                    <button onclick="alternarAba('aba-extrato')" id="btn-aba-extrato" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer">
                        <i class="fa-solid fa-file-signature w-5"></i> Extrato de Auditoria
                    </button>
                    
                    <input type="file" id="input-importar-json" accept=".json" onchange="processarImportacaoJson(event)" class="hidden">
                    
                    <button onclick="document.getElementById('input-importar-json').click()" class="w-full flex items-center gap-3 text-blue-400 hover:bg-blue-950/40 hover:text-blue-300 px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer mt-4 border border-blue-800/40 bg-blue-950/10">
                        <i class="fa-solid fa-upload w-5"></i> Importar DB.json
                    </button>

                    <button onclick="exportarJson()" class="w-full flex items-center gap-3 text-emerald-400 hover:bg-emerald-950/40 hover:text-emerald-300 px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer mt-2 border border-emerald-800/40 bg-emerald-950/10">
                        <i class="fa-solid fa-download w-5"></i> Exportar DB.json
                    </button>
                    <button onclick="logout();" class="w-full flex items-center gap-3 text-red-400 hover:bg-red-950/40 hover:text-red-300 px-4 py-3 rounded-lg font-medium transition-all mt-8 border-t border-slate-800/60 pt-4 text-left cursor-pointer">
                        <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Sair com Segurança
                    </button>
                </nav>
            </div>
            <div class="text-sm text-slate-500">v6.3.0 • Real dataset</div>
        </div>

        <!-- Área de Conteúdo Flexível -->
        <div class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center shadow-sm sticky top-0 z-50 no-print shrink-0">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900" id="titulo-pagina">Métricas Analíticas e Visão Geral</h1>
                    <p class="text-sm text-slate-500" id="subtitulo-pagina">Indicadores avançados de desempenho de glosas e auditoria em tempo real</p>
                </div>
                <div class="w-10 h-10 bg-blue-100 text-blue-600 font-semibold rounded-full flex items-center justify-center border border-blue-200 shrink-0">RB</div>
            </header>

            <main class="p-8 space-y-6 max-w-7xl w-full mx-auto flex-1">
                
                <!-- SEÇÃO 1: DASHBOARD ANALÍTICO -->
                <div id="aba-dashboard" class="space-y-6 secao-sistema">
                    <!-- GRID DE KPIS CONGELADOS -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 auto-rows-fr">
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-md h-28 flex flex-col justify-between shrink-0 overflow-hidden">
                            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider truncate">A Pagar Geral</p>
                            <h3 class="text-xl font-bold text-slate-900 mt-1 truncate" id="dash-apagar">R$ 0,00</h3>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-md h-28 flex flex-col justify-between shrink-0 overflow-hidden">
                            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider truncate">Auditado Retido</p>
                            <h3 class="text-xl font-bold text-slate-900 mt-1 truncate" id="dash-auditado">R$ 0,00</h3>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-md h-28 flex flex-col justify-between shrink-0 overflow-hidden">
                            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider truncate">Total Pago Liquido</p>
                            <h3 class="text-xl font-bold text-slate-900 mt-1 truncate" id="dash-pago">R$ 0,00</h3>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-emerald-200 shadow-md bg-gradient-to-br from-emerald-50 to-white h-28 flex flex-col justify-between shrink-0 overflow-hidden">
                            <p class="text-xs font-semibold text-emerald-700 uppercase tracking-wider truncate">Total Recuperado</p>
                            <h3 class="text-xl font-bold text-emerald-600 mt-1 truncate" id="dash-recuperado">R$ 0,00</h3>
                        </div>
                    </div>

                    <div class="bg-black border-y-2 border-blue-600 text-white text-xl font-mono py-4 tracking-wider ticker-container shadow-lg rounded-xl select-none">
                        <div class="ticker-conteudo flex items-center space-x-24" id="letreiro-bolsa"><span>Sincronizando lotes...</span></div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="bg-blue-50 text-blue-600 p-3 rounded-xl shrink-0"><i class="fa-solid fa-percent text-lg"></i></div>
                            <div><p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Índice de Glosa</p><h4 class="text-base font-black text-slate-900" id="card-idx-glosa">0.0%</h4></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="bg-amber-50 text-amber-600 p-3 rounded-xl shrink-0"><i class="fa-solid fa-hourglass-half text-lg"></i></div>
                            <div><p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Atraso Médio</p><h4 class="text-base font-black text-slate-900" id="card-atraso">0 dias</h4></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="bg-purple-50 text-purple-600 p-3 rounded-xl shrink-0"><i class="fa-solid fa-receipt text-lg"></i></div>
                            <div><p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Ticket Médio/Conta</p><h4 class="text-base font-black text-slate-900" id="card-ticket">R$ 0,00</h4></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="bg-slate-50 text-slate-600 p-3 rounded-xl shrink-0"><i class="fa-solid fa-folder-open text-lg"></i></div>
                            <div><p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Faturas em Aberto</p><h4 class="text-base font-black text-slate-900" id="card-abertas">0 faturas</h4></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center relative min-h-[200px]">
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Meta Operacional: Eficiência de Glosa</h3>
                            <div class="w-full max-w-[240px] h-32 relative"><canvas id="gaugeGlosa"></canvas><div class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-center"><span class="text-2xl font-black text-slate-900" id="txt-gauge-glosa">0.0%</span></div></div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center relative min-h-[200px]">
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Meta de Liquidação: Repasses Pagos</h3>
                            <div class="w-full max-w-[240px] h-32 relative"><canvas id="gaugePago"></canvas><div class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-center"><span class="text-2xl font-black text-slate-900" id="txt-gauge-pago">0.0%</span></div></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm lg:col-span-2 min-h-[300px]">
                            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Evolução Mensal: Cobrado x Liberado</h3>
                            <div class="h-64 relative"><canvas id="graficoEvolucao"></canvas></div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center min-h-[300px]">
                            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 w-full text-left">Representatividade por Status</h3>
                            <div class="h-64 w-full relative"><canvas id="graficoDonutStatus"></canvas></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-md">
                            <div class="flex items-center gap-2 text-slate-900 font-bold text-sm uppercase tracking-tight border-b border-slate-100 pb-3 mb-4">
                                <i class="fa-solid fa-ranking-star text-blue-600"></i> Foco de Glosas (Top Setores)
                            </div>
                            <div id="container-top-glosas" class="space-y-2"></div>
                        </div>

                        <div class="bg-white rounded-2xl border border-slate-200 shadow-md lg:col-span-2 overflow-hidden flex flex-col justify-between">
                            <div class="p-6 pb-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                                <h3 class="text-sm font-bold text-slate-900 uppercase tracking-tight">Últimas Atividades Processadas (Competências Recentes)</h3>
                                <button onclick="alternarAba('aba-extrato')" class="text-blue-600 text-xs font-bold hover:underline cursor-pointer">Ver Todos os Extratos</button>
                            </div>
                            <div class="overflow-x-auto w-full">
                                <table class="w-full min-w-[600px] text-left border-collapse text-xs">
                                    <thead>
                                        <tr class="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold tracking-wider border-b border-slate-100">
                                            <th class="py-3 px-6">Prestador</th>
                                            <th class="py-3 px-6 text-center">Competência</th>
                                            <th class="py-3 px-6 text-right">Faturado</th>
                                            <th class="py-3 px-6 text-right">Glosa (Auditado)</th>
                                            <th class="py-3 px-6 text-center">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="dash-movimentacoes" class="divide-y divide-slate-100 font-medium text-slate-700"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SEÇÃO 2: QUADRO DE TAREFAS AVANÇADO (COM PRODUTIVIDADE, VELOCÍMETROS E INSTÂNCIAS) -->
                <div id="aba-tarefas" class="space-y-6 secao-sistema hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs text-center">
                            <div class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Demandas Ativas</div>
                            <div class="text-xl font-extrabold text-slate-900" id="kpi-task-total">0</div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs text-center">
                            <div class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Gargalos / Travados</div>
                            <div class="text-xl font-extrabold text-red-500" id="kpi-task-stuck">0</div>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100 shadow-xs text-center">
                            <div class="text-[10px] uppercase font-bold text-emerald-600 tracking-wider">Eficiência de Entrega</div>
                            <div class="text-xl font-extrabold text-emerald-600" id="kpi-task-progress">0%</div>
                        </div>
                    </div>

                    <!-- MÓDULO DE VELOCÍMETROS E PRODUTIVIDADE DE TAREFAS -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center justify-center relative min-h-[180px]">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 text-center w-full">Velocímetro de Eficiência de Entrega</h4>
                            <div class="w-full max-w-[200px] h-28 relative">
                                <canvas id="gaugeTaskProgress"></canvas>
                                <div class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-center">
                                    <span class="text-xl font-black text-slate-900" id="txt-gauge-task-progress">0%</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm min-h-[180px] flex flex-col justify-between">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 w-full">Produtividade / Carga de Trabalho por Profissional</h4>
                            <div class="h-32 w-full relative"><canvas id="chartTaskProdutividade"></canvas></div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm min-h-[180px] flex flex-col justify-between">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 w-full">Demandas Distribuidoras por Instância</h4>
                            <div class="h-32 w-full relative"><canvas id="chartTaskInstancia"></canvas></div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-md space-y-5">
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center border-b border-slate-100 pb-3 gap-2">
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500"><i class="fa-solid fa-arrow-down-short-wide text-blue-500 mr-1"></i> Fluxo de Processos & Escalabilidade de Instâncias</h3>
                            <div class="w-44 bg-slate-100 rounded-full h-2 overflow-hidden border border-slate-200">
                                <div id="task-bar-fill" class="bg-emerald-500 h-full w-0 transition-all duration-300"></div>
                            </div>
                        </div>

                        <!-- Formulário Customizado Avançado -->
                        <form id="form-tarefa" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <div class="lg:col-span-2">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Descrição da Atividade</label>
                                <input type="text" id="add-task-nome" required placeholder="Ex: Conciliação de glosa de materiais..." class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Fluxo / Setor</label>
                                <select id="add-task-setor" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                                    <option value="Auditoria">Auditoria</option>
                                    <option value="Faturamento">Faturamento</option>
                                    <option value="SADT">SADT</option>
                                    <option value="T.I. / Suporte">T.I. / Suporte</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Executor</label>
                                <input type="text" id="add-task-responsavel" required placeholder="Nome do encarregado..." class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Supervisão / Instância</label>
                                <select id="add-task-instancia" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                                    <option value="1a Instância">1ª Instância (Auditoria Interna)</option>
                                    <option value="2a Instância">2ª Instância (Coord. Faturamento)</option>
                                    <option value="3a Instância">3ª Instância (Robson Farias)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Prazo Final</label>

                    { timestamp: "ts_8", competencia: "12/2025", prestador: "HOSPITAL FELICIO ROCHO", setor: "IMAGEM",      valor_faturado: 26888.07,  valor_auditado: 0.00,     atraso: 170, status: "A Pagar" },

            document.getElementById('bloco-autenticacao').remove();

        function alternarAba(idAba) {
            document.querySelectorAll('.secao-sistema').forEach(s => s.classList.add('hidden'));
            document.getElementById(idAba).classList.remove('hidden');

            const titulos = {
                'aba-dashboard': ['Métricas Analíticas e Visão Geral', 'Indicadores avançados de desempenho de glosas e auditoria em tempo real'],
                'aba-tarefas': ['Quadro de Tarefas Operacionais', 'Administração de demandas, produtividade e velocímetros das metas'],
                'aba-contas': ['Lançar Faturas', 'Gerenciamento operacional e auditoria de lotes'],
                'aba-extrato': ['Extrato de Auditoria', 'Gere relatórios profissionais consolidados e filtros avançados']
            };
            document.getElementById('titulo-pagina').innerText = titulos[idAba][0];
            document.getElementById('subtitulo-pagina').innerText = titulos[idAba][1];

            ['btn-aba-dashboard', 'btn-aba-tarefas', 'btn-aba-contas', 'btn-aba-extrato'].forEach(btn => {
                const el = document.getElementById(btn);
                if(el) {
                    el.className = btn === `btn-${idAba}` 
                        ? "w-full flex items-center gap-3 bg-slate-800 text-blue-400 px-4 py-3 rounded-lg font-medium text-left cursor-pointer"
                        : "w-full flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer";
                }
            });
        }

        function carregarDadosCompletos() {
            const db = JSON.parse(localStorage.getItem('db.json'));
            todasContasLocais = db.ultimas_contas || [];
            
            let totalFaturado = 0;   
            let totalAuditadoGlosa = 0;  
            let totalRepasseLiquido = 0;        
            let totalAtraso = 0;
            let qtdComAtraso = 0;
            let totalValorPago = 0;
            
            let contagemStatus = { "A Pagar": 0, "Auditada": 0, "Paga": 0 };
            let mapaGlosasPorSetor = {};

            todasContasLocais.forEach(c => {
                const fat = parseFloat(c.valor_faturado) || 0;
                const glosa = parseFloat(c.valor_auditado) || 0;
                const setorNome = (c.setor || 'GERAL').toUpperCase().trim();
                
                totalFaturado += fat;
                totalAuditadoGlosa += glosa;
                totalRepasseLiquido += (fat - glosa);

                if (c.status === "Paga") {
                    totalValorPago += (fat - glosa);
                }

                if(c.atraso) {
                    totalAtraso += parseInt(c.atraso);
                    qtdComAtraso++;
                }

                if(contagemStatus[c.status] !== undefined) {
                    contagemStatus[c.status]++;
                }

                if(!mapaGlosasPorSetor[setorNome]) mapaGlosasPorSetor[setorNome] = 0;
                mapaGlosasPorSetor[setorNome] += glosa;
            });

            const idxGlosaGeral = totalFaturado > 0 ? ((totalAuditadoGlosa / totalFaturado) * 100) : 0;
            const mediaAtraso = qtdComAtraso > 0 ? Math.round(totalAtraso / qtdComAtraso) : 0;
            const ticketMedio = todasContasLocais.length > 0 ? (totalFaturado / todasContasLocais.length) : 0;
            const percentualPago = totalRepasseLiquido > 0 ? ((totalValorPago / totalRepasseLiquido) * 100) : 0;

            document.getElementById('dash-apagar').innerText = 'R$ ' + totalRepasseLiquido.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('dash-auditado').innerText = 'R$ ' + totalAuditadoGlosa.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('dash-pago').innerText = 'R$ ' + totalValorPago.toLocaleString('pt-BR', {minimumFractionDigits: 2}); 
            document.getElementById('dash-recuperado').innerText = 'R$ ' + totalAuditadoGlosa.toLocaleString('pt-BR', {minimumFractionDigits: 2});

            document.getElementById('card-idx-glosa').innerText = idxGlosaGeral.toFixed(1) + '%';
            document.getElementById('card-atraso').innerText = mediaAtraso + ' dias';
            document.getElementById('card-ticket').innerText = 'R$ ' + ticketMedio.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('card-abertas').innerText = contagemStatus['A Pagar'] + ' faturas';

            let stringTicker = "";
            todasContasLocais.forEach(c => {
                stringTicker += `<span class="inline-flex items-center space-x-2 text-[16px]"><span class="text-slate-300 font-bold uppercase">${c.prestador} (${c.competencia}):</span><span class="text-emerald-400 font-medium neon-text-green">▲ FAT R$ ${c.valor_faturado.toLocaleString('pt-BR', {maximumFractionDigits:0})}</span><span class="text-red-400 font-medium neon-text-red">▼ GLO R$ ${c.valor_auditado.toLocaleString('pt-BR', {maximumFractionDigits:0})}</span></span> &nbsp;&nbsp;&nbsp;&nbsp;`;
            });
            document.getElementById('letreiro-bolsa').innerHTML = stringTicker ? stringTicker + stringTicker : "<span>Painel operacional sincronizado.</span>";

            const rankingOrdenado = Object.keys(mapaGlosasPorSetor)
                .map(s => ({ nome: s, totalGlosa: mapaGlosasPorSetor[s] }))
                .sort((a, b) => b.totalGlosa - a.totalGlosa);

            const containerTopGlosas = document.getElementById('container-top-glosas');
            containerTopGlosas.innerHTML = rankingOrdenado.map((s, index) => {
                return `<div class="flex items-center justify-between bg-slate-50 border border-slate-100 p-3 rounded-xl shadow-xs">
                            <div class="flex items-center gap-2 truncate">
                                <span class="bg-blue-100 text-blue-700 font-bold text-[10px] w-5 h-5 rounded-full flex items-center justify-center shrink-0">${index + 1}º</span>
                                <span class="text-xs font-bold text-slate-700 tracking-tight truncate max-w-[150px]">${s.nome}</span>
                            </div>
                            <span class="text-xs font-black text-red-600 shrink-0">R$ ${s.totalGlosa.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                        </div>`;
            }).join('');

            document.getElementById('txt-gauge-glosa').innerText = idxGlosaGeral.toFixed(1) + '%';
            document.getElementById('txt-gauge-pago').innerText = percentualPago.toFixed(1) + '%';

            renderizarGauges(idxGlosaGeral, percentualPago);
            renderizarGraficosAvancados(contagemStatus);
            renderizarTabelas(totalFaturado, totalAuditadoGlosa, totalRepasseLiquido);
        }

        function renderizarGauges(glosa, pago) {
            if(!window.Chart) return;
            const opt = { responsive: true, maintainAspectRatio: false, rotation: -90, circumference: 180, plugins: { legend: { display: false } }, cutout: '80%' };
            if (gaugeChartGlosa) gaugeChartGlosa.destroy();
            gaugeChartGlosa = new Chart(document.getElementById('gaugeGlosa').getContext('2d'), { type: 'doughnut', data: { datasets: [{ data: [glosa, Math.max(0, 100 - glosa)], backgroundColor: ['#3b82f6', '#e2e8f0'], borderWidth: 0 }] }, options: opt });
            if (gaugeChartPago) gaugeChartPago.destroy();
            gaugeChartPago = new Chart(document.getElementById('gaugePago').getContext('2d'), { type: 'doughnut', data: { datasets: [{ data: [pago, Math.max(0, 100 - pago)], backgroundColor: ['#10b981', '#e2e8f0'], borderWidth: 0 }] }, options: opt });
        }

        function renderizarGraficosAvancados(statusData) {
            if(!window.Chart) return;

            if (chartEvolucao) chartEvolucao.destroy();
            chartEvolucao = new Chart(document.getElementById('graficoEvolucao').getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['12/2024', '12/2025', '01/2026', '02/2026', '03/2026'],
                    datasets: [
                        { label: 'Faturado', data: [187010, 35610, 22416, 10647, 56875], borderColor: '#cbd5e1', borderDash: [5, 5], fill: false, tension: 0.4 },
                        { label: 'Repasse', data: [171524, 35610, 21080, 9475, 42201], borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.05)', fill: true, tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            if (chartDonutStatus) chartDonutStatus.destroy();
            chartDonutStatus = new Chart(document.getElementById('graficoDonutStatus').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['A Pagar', 'Auditado', 'Pago'],
                    datasets: [{ 
                        data: [statusData["A Pagar"], statusData["Auditada"], statusData["Paga"]], 
                        backgroundColor: ['#f59e0b', '#3b82f6', '#10b981'] 
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        function renderizarTabelas(totFat, totAud, totRep) {
            const corpoDash = document.getElementById('dash-movimentacoes');
            if(!corpoDash) return;
            const competentes2026 = todasContasLocais.filter(x => x.competencia.endsWith("2026"));
            
            corpoDash.innerHTML = competentes2026.map(c => {
                return `<tr class="hover:bg-slate-50/80 transition-all">
                    <td class="py-3 px-6 font-bold text-slate-900">${c.prestador}</td>
                    <td class="py-3 px-6 text-center text-slate-500 font-mono">${c.competencia}</td>
                    <td class="py-3 px-6 text-right font-mono">R$ ${c.valor_faturado.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3 px-6 text-right text-red-500 font-semibold font-mono">R$ ${c.valor_auditado.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3 px-6 text-center"><span class="bg-amber-50 text-amber-600 px-2.5 py-0.5 rounded-md font-bold text-[10px]">${c.status}</span></td>
                </tr>`;
            }).join('');

            document.getElementById('tot-foot-faturado').innerText = 'R$ ' + totFat.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('tot-foot-auditado').innerText = 'R$ ' + totAud.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('tot-foot-repasse').innerText = 'R$ ' + totRep.toLocaleString('pt-BR', {minimumFractionDigits: 2});

            filtrarExtrato();
        }

        function filtrarExtrato() {
            const nome = document.getElementById('filtro-nome').value.toLowerCase();
            const comp = document.getElementById('filtro-comp').value;
            const status = document.getElementById('filtro-status').value;
            const corpoExtrato = document.getElementById('tabela-extrato');
            if(!corpoExtrato) return;
            
            const filtradas = todasContasLocais.filter(c => {
                return c.prestador.toLowerCase().includes(nome) && 
                       (comp === "Todas" || c.competencia === comp) && 
                       (status === "Todos" || c.status === status);
            });

            corpoExtrato.innerHTML = filtradas.map(c => {
                const repasse = c.valor_faturado - c.valor_auditado;
                return `<tr class="hover:bg-slate-50 transition-all">
                    <td class="py-3.5 px-5 text-center font-mono text-slate-500">${c.competencia}</td>
                    <td class="py-3.5 px-5 font-bold text-slate-900">${c.prestador}</td>
                    <td class="py-3.5 px-5 text-xs text-slate-500 font-semibold">${c.setor || 'GERAL'}</td>
                    <td class="py-3.5 px-5 text-right font-mono text-slate-600">R$ ${c.valor_faturado.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3.5 px-5 text-right font-mono text-red-500">R$ ${c.valor_auditado.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3.5 px-5 text-right font-mono text-blue-600">R$ ${repasse.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3.5 px-5 text-center text-slate-400 font-mono">${c.atraso ? c.atraso+'d' : '--'}</td>
                    <td class="py-3.5 px-5 text-center"><span class="bg-amber-50 text-amber-700 border border-amber-200/50 px-2 py-0.5 rounded font-bold text-[10px]">${c.status}</span></td>
                    <td class="py-3.5 px-5 text-center no-print"><button onclick="prepararEdicao('${c.timestamp}')" class="text-blue-600 hover:text-blue-800 font-bold cursor-pointer"><i class="fa-solid fa-pen-to-square"></i></button></td>
                </tr>`;
            }).join('');
        }

        // --- SISTEMA INTERNO DO SCRIPT DO MONDAY (TAREFAS OPERACIONAIS) ---
        function emitTaskLog(msg) {
            const hora = new Date().toLocaleTimeString();
            logsPainel.unshift(`[${hora}] ${msg}`);
            if (logsPainel.length > 15) logsPainel.pop();
            localStorage.setItem('monday_standalone_logs', JSON.stringify(logsPainel));
            
            const lEl = document.getElementById('log-task-auditoria');
            if (lEl) lEl.innerHTML = logsPainel.map(l => `<div>${l}</div>`).join('');
        }

        function computeDateIndicator(deadlineStr) {
            if(!deadlineStr) return { html: `<span class="text-slate-400">--</span>` };
            
            const targetDate = new Date(deadlineStr + 'T00:00:00');
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const parts = deadlineStr.split('-');
            const formattedDate = `${parts[2]}/${parts[1]}`;

            if (diffDays < 0) {
                return {
                    html: `<div class="text-center"><span class="text-red-500 font-bold block">${formattedDate}</span><span class="text-[10px] bg-red-100 text-red-700 px-1.5 py-0.2 rounded font-black uppercase">Atrasado ${Math.abs(diffDays)}d</span></div>`
                };
            } else if (diffDays === 0) {
                return {
                    html: `<div class="text-center"><span class="text-amber-500 font-bold block">${formattedDate}</span><span class="text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.2 rounded font-black uppercase">Entrega Hoje</span></div>`
                };
            } else {
                return {
                    html: `<div class="text-center"><span class="text-slate-700 font-medium block">${formattedDate}</span><span class="text-[10px] text-slate-400 block">Faltam ${diffDays} dias</span></div>`
                };
            }
        }

        function renderPainelTarefas() {
            const tbody = document.getElementById('container-tarefas');
            if(!tbody) return;
            tbody.innerHTML = '';

            painelTarefas.forEach(t => {
                const dateMeta = computeDateIndicator(t.data);
                let instanceBadgeClass = "instance-1st";
                if(t.instancia === "2a Instância") instanceBadgeClass = "instance-2nd";
                if(t.instancia === "3a Instância") instanceBadgeClass = "instance-3rd";

                tbody.innerHTML += `<tr class="hover:bg-slate-50/80 border-b border-slate-100">
                    <td class="py-2.5 px-4"><span class="bg-slate-200 text-slate-700 text-[10px] font-extrabold px-2 py-0.5 rounded uppercase tracking-wider">${t.setor || 'Geral'}</span></td>
                    <td class="py-2.5 px-4 font-bold text-slate-950">${t.nome}</td>
                    <td class="py-2.5 px-4 font-semibold text-slate-600"><i class="fa-solid fa-circle-user text-slate-400 mr-1"></i>${t.responsavel}</td>
                    <td class="py-2.5 px-4 text-center">
                        <select class="monday-select px-2.5 py-1 rounded text-[10px] font-extrabold text-white tracking-wide w-44 ${instanceBadgeClass}" onchange="changeTaskInstance('${t.id}', this.value)">
                            <option value="1a Instância" ${t.instancia === '1a Instância' ? 'selected' : ''}>1ª Inst. (Auditoria Interna)</option>
                            <option value="2a Instância" ${t.instancia === '2a Instância' ? 'selected' : ''}>2ª Inst. (Coord. Faturamento)</option>
                            <option value="3a Instância" ${t.instancia === '3a Instância' ? 'selected' : ''}>3ª Inst. (Robson Farias)</option>
                        </select>
                    </td>
                    <td class="py-2.5 px-4">${dateMeta.html}</td>
                    <td class="py-2.5 px-4 text-center">
                        <select class="monday-select px-2 py-0.5 rounded text-[10px] uppercase w-20 priority-${t.prioridade === 'Alta' ? 'high' : (t.prioridade === 'Média' ? 'medium' : 'low')}" onchange="changeTaskPriority('${t.id}', this.value)">
                            <option value="Alta" ${t.prioridade === 'Alta' ? 'selected' : ''}>Alta</option>
                            <option value="Média" ${t.prioridade === 'Média' ? 'selected' : ''}>Média</option>
                            <option value="Baixa" ${t.prioridade === 'Baixa' ? 'selected' : ''}>Baixa</option>
                        </select>
                    </td>
                    <td class="py-2.5 px-4 text-center">
                        <select class="monday-select px-2 py-0.5 rounded text-[10px] uppercase w-24 status-${t.status}" onchange="changeTaskStatus('${t.id}', this.value)">
                            <option value="backlog" ${t.status === 'backlog' ? 'selected' : ''}>Backlog</option>
                            <option value="working" ${t.status === 'working' ? 'selected' : ''}>Trabalhando</option>
                            <option value="stuck" ${t.status === 'stuck' ? 'selected' : ''}>Travado</option>
                            <option value="done" ${t.status === 'done' ? 'selected' : ''}>Concluído</option>
                        </select>
                    </td>
                    <td class="py-2.5 px-4 text-center">
                        <button onclick="deleteTaskDirect('${t.id}')" class="text-slate-400 hover:text-red-500 cursor-pointer text-xs"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>`;
            });

            calculateTaskMetrics();
            updateTaskCharts();
            localStorage.setItem('monday_standalone_tasks', JSON.stringify(painelTarefas));
        }

        function calculateTaskMetrics() {
            const tot = painelTarefas.length;
            const stuck = painelTarefas.filter(t => t.status === 'stuck').length;
            const done = painelTarefas.filter(t => t.status === 'done').length;
            const pct = tot > 0 ? Math.round((done / tot) * 100) : 0;

            document.getElementById('kpi-task-total').innerText = tot;
            document.getElementById('kpi-task-stuck').innerText = stuck;
            document.getElementById('kpi-task-progress').innerText = `${pct}%`;
            document.getElementById('task-bar-fill').style.width = `${pct}%`;
            
            // Atualiza o texto do Velocímetro (Gauge)
            const txtProgress = document.getElementById('txt-gauge-task-progress');
            if (txtProgress) txtProgress.innerText = `${pct}%`;
        }

        window.changeTaskStatus = function(id, status) {
            const t = painelTarefas.find(x => x.id === id);
            if(t) {
                const antigo = t.status;
                t.status = status;
                emitTaskLog(`Status de "${t.nome}" alterado de [${antigo}] para [${status}].`);
                renderPainelTarefas();
            }
        };

        window.changeTaskPriority = function(id, prio) {
            const t = painelTarefas.find(x => x.id === id);
            if(t) {
                const antiga = t.prioridade;
                t.prioridade = prio;
                emitTaskLog(`Prioridade de "${t.nome}" mudou de [${antiga}] para [${prio}].`);
                renderPainelTarefas();
            }
        };

        window.changeTaskInstance = function(id, novaInstancia) {
            const t = painelTarefas.find(x => x.id === id);
            if(t) {
                const antiga = t.instancia;
                t.instancia = novaInstancia;
                emitTaskLog(`Alça de Escalabilidade: Atividade "${t.nome}" transferida de [${antiga}] para [${novaInstancia}].`);
                renderPainelTarefas();
            }
        };

        window.deleteTaskDirect = function(id) {
            const t = painelTarefas.find(x => x.id === id);
            if(t && confirm(`Excluir a tarefa "${t.nome}" do fluxo permanente?`)) {
                painelTarefas = painelTarefas.filter(x => x.id !== id);
                emitTaskLog(`Tarefa "${t.nome}" removida pelo supervisor.`);
                renderPainelTarefas();
            }
        };

        // INICIALIZAÇÃO DOS GRAFICOS DE TAREFAS
        function initTaskCharts() {
            const ctxGauge = document.getElementById('gaugeTaskProgress');
            if(!ctxGauge) return;
            gaugeTaskProgress = new Chart(ctxGauge.getContext('2d'), {
                type: 'doughnut',
                data: { datasets: [{ data: [0, 100], backgroundColor: ['#00c875', '#e2e8f0'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, rotation: -90, circumference: 180, plugins: { legend: { display: false } }, cutout: '80%' }
            });

            const ctxProd = document.getElementById('chartTaskProdutividade').getContext('2d');
            chartTaskProdutividade = new Chart(ctxProd, {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: '#0284c7', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 9 } } }, x: { ticks: { font: { size: 9 } } } }, plugins: { legend: { display: false } } }
            });

            const ctxInst = document.getElementById('chartTaskInstancia').getContext('2d');
            chartTaskInstancia = new Chart(ctxInst, {
                type: 'doughnut',
                data: { labels: ['1ª Inst.', '2ª Inst.', '3ª Inst.'], datasets: [{ data: [0,0,0], backgroundColor: ['#0284c7', '#0f766e', '#1e1b4b'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { boxWidth: 8, font: { size: 9 } } } } }
            });
        }

        function updateTaskCharts() {
            if(!gaugeTaskProgress || !chartTaskProdutividade || !chartTaskInstancia) return;

            const tot = painelTarefas.length;
            const done = painelTarefas.filter(t => t.status === 'done').length;
            const pct = tot > 0 ? Math.round((done / tot) * 100) : 0;

            // Atualiza o Velocímetro de Tarefas
            gaugeTaskProgress.data.datasets[0].data = [pct, Math.max(0, 100 - pct)];
            gaugeTaskProgress.update();

            // Atualiza Produtividade por Profissional (Barras)
            const countExecutores = {};
            painelTarefas.forEach(t => countExecutores[t.responsavel] = (countExecutores[t.responsavel] || 0) + 1);
            chartTaskProdutividade.data.labels = Object.keys(countExecutores);
            chartTaskProdutividade.data.datasets[0].data = Object.values(countExecutores);
            chartTaskProdutividade.update();

            // Atualiza Instâncias de Supervisão (Rosca)
            const inst1 = painelTarefas.filter(t => t.instancia === '1a Instância').length;
            const inst2 = painelTarefas.filter(t => t.instancia === '2a Instância').length;
            const inst3 = painelTarefas.filter(t => t.instancia === '3a Instância').length;
            chartTaskInstancia.data.datasets[0].data = [inst1, inst2, inst3];
            chartTaskInstancia.update();
        }

        // --- ENGENHARIA DE EVENTOS DO CORE ---
        function mapearEventosInjetados() {
            document.getElementById('form-conciliacao').addEventListener('submit', (e) => {
                e.preventDefault();
                const fat = parseFloat(document.getElementById('form-faturado').value) || 0;
                const aud = parseFloat(document.getElementById('form-auditado').value) || 0;
                const tsExistente = document.getElementById('conta-timestamp').value;

                let db = JSON.parse(localStorage.getItem('db.json'));

                const novaConta = {
                    timestamp: tsExistente || 'ts_' + Date.now(),
                    competencia: document.getElementById('form-competencia').value,
                    prestador: document.getElementById('form-prestador').value.toUpperCase(),
                    setor: document.getElementById('form-setor').value.toUpperCase() || 'GERAL',
                    valor_faturado: fat,
                    valor_auditado: aud,
                    atraso: parseInt(document.getElementById('form-atraso').value) || 0,
                    status: document.getElementById('form-status').value
                };

                if (tsExistente) {
                    const index = db.ultimas_contas.findIndex(c => c.timestamp === tsExistente);
                    if(index !== -1) db.ultimas_contas[index] = novaConta;
                } else {
                    db.ultimas_contas.unshift(novaConta);
                }

                localStorage.setItem('db.json', JSON.stringify(db));
                limparFormulario(); 
                carregarDadosCompletos(); 
                alternarAba('aba-dashboard');
            });

            // Evento de Criação da Nova Demanda com Todos os Indicadores Ativados
            document.getElementById('form-tarefa').addEventListener('submit', function(e) {
                e.preventDefault();
                const nIn = document.getElementById('add-task-nome');
                const rIn = document.getElementById('add-task-responsavel');
                const sIn = document.getElementById('add-task-setor');
                const iIn = document.getElementById('add-task-instancia');
                const dIn = document.getElementById('add-task-data');
                const pIn = document.getElementById('add-task-prio');

                painelTarefas.push({ 
                    id: 'tk_' + Date.now(), 
                    nome: nIn.value, 
                    responsavel: rIn.value, 
                    instancia: iIn.value,
                    setor: sIn.value,
                    data: dIn.value,
                    prioridade: pIn.value, 
                    status: 'working' 
                });
                
                emitTaskLog(`Nova demanda mapeada: "${nIn.value}" alocada em [${iIn.value}].`);
                
                // Resetando os inputs de texto e data
                nIn.value = ''; 
                rIn.value = '';
                dIn.value = '';
                
                renderPainelTarefas();
            });
            emitTaskLog("Mapeamento de processos operacionais atualizado.");
        }

        function prepararEdicao(ts) {
            const conta = todasContasLocais.find(c => c.timestamp === ts);
            if (!conta) return;
            document.getElementById('conta-timestamp').value = conta.timestamp;
            document.getElementById('form-prestador').value = conta.prestador;
            document.getElementById('form-setor').value = conta.setor || '';
            document.getElementById('form-atraso').value = conta.atraso || '';
            document.getElementById('form-competencia').value = conta.competencia;
            document.getElementById('form-faturado').value = conta.valor_faturado;
            document.getElementById('form-auditado').value = conta.valor_auditado;
            document.getElementById('form-status').value = conta.status;
            
            document.getElementById('form-titulo').innerHTML = `<i class="fa-solid fa-file-pen text-amber-500 mr-1"></i> Editando Lançamento Ativo`;
            document.getElementById('indicador-modo').classList.remove('hidden');
            alternarAba('aba-contas');
        }

        function limparFormulario() {
            document.getElementById('form-conciliacao').reset();
            document.getElementById('conta-timestamp').value = '';
            document.getElementById('form-titulo').innerHTML = `<i class="fa-solid fa-file-circle-plus text-blue-600 mr-1"></i> Gestão e Lançamento de Faturas`;
            document.getElementById('indicador-modo').classList.add('hidden');
        }

        function exportarJson() {
            const dadosEstáticos = localStorage.getItem('db.json');
            const blob = new Blob([dadosEstáticos], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'db.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function processarImportacaoJson(event) {
            const arquivo = event.target.files[0];
            if (!arquivo) return;
            const leitor = new FileReader();
            leitor.onload = function(e) {
                try {
                    const conteudoJson = JSON.parse(e.target.result);
                    if (conteudoJson && Array.isArray(conteudoJson.ultimas_contas)) {
                        localStorage.setItem('db.json', JSON.stringify(conteudoJson));
                        carregarDadosCompletos();
                        alert('Base de dados updated!');
                        event.target.value = '';
                    } else { alert('Formato inválido!'); }
                } catch (erro) { alert('Erro ao ler o arquivo JSON.'); }
            };
            leitor.readAsText(arquivo);
        }
    </script>
