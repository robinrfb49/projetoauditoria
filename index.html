<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas Analíticas e Visão Geral - Labdiag</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
        .ticker-container { overflow: hidden; white-space: nowrap; }
        .ticker-conteudo { display: inline-block; animation: ticker 40s linear infinite; }
        .ticker-container:hover .ticker-conteudo { animation-play-state: paused; }
        .neon-text-green { text-shadow: 0 0 6px rgba(52, 211, 153, 0.6); }
        .neon-text-red { text-shadow: 0 0 6px rgba(248, 113, 113, 0.6); }

        /* Estilos do Quadro de Tarefas (Estilo Monday) */
        .monday-select { appearance: none; -webkit-appearance: none; text-align: center; font-weight: 800; color: white; cursor: pointer; transition: all 0.2s ease; border: none; }
        .status-working { background-color: #fdab3d; }
        .status-done { background-color: #00c875; }
        .status-stuck { background-color: #e2445c; }
        .status-backlog { background-color: #797e93; }
        
        .priority-high { background-color: #ef4444; }
        .priority-medium { background-color: #a25ddc; }
        .priority-low { background-color: #55596e; }

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .w-64, header, .no-print, button, input, select { display: none !important; }
            .flex-1, #estrutura-sistema, #corpo-principal { width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; display: block !important; height: auto !important;}
        }
    </style>
</head>
<body class="bg-slate-900 font-sans text-slate-800 min-h-screen flex items-center justify-center m-0" id="corpo-principal">

    <!-- ========================================== -->
    <!-- TELA DE LOGIN                              -->
    <!-- ========================================== -->
    <div id="bloco-autenticacao" class="w-full max-w-md mx-4 transition-all duration-300 block">
        <div class="bg-white p-8 rounded-2xl shadow-2xl border border-slate-800/10">
            <div class="text-center mb-8">
                <div class="bg-blue-600 text-white font-bold text-2xl w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-md">LD</div>
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Acesso ao Labdiag</h2>
                <p class="text-sm text-slate-400 mt-1">Área estritamente restrita a administradores</p>
            </div>
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Utilizador</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-3.5 top-3 text-slate-400 text-sm"></i>
                        <input type="text" id="login-user" value="admin" required class="w-full pl-10 pr-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-blue-500 bg-slate-50">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Palavra-passe</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-3 text-slate-400 text-sm"></i>
                        <input type="password" id="login-pass" value="1234" required class="w-full pl-10 pr-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-blue-500 bg-slate-50">
                    </div>
                </div>
                <div id="erro-autenticacao" class="text-red-500 text-xs font-bold hidden text-center bg-red-50 py-2 rounded-lg border border-red-100 animate-pulse">
                    <i class="fa-solid fa-triangle-exclamation"></i> Credenciais incorretas. Acesso negado.
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-xl text-sm hover:bg-blue-700 transition-all cursor-pointer shadow-md mt-2">
                    <i class="fa-solid fa-right-to-bracket"></i> Verificar e Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- CONTAINER PRINCIPAL DO SISTEMA -->
    <div id="estrutura-sistema" class="w-full h-screen flex overflow-hidden hidden bg-slate-50"></div>

    <template id="template-admin">
        <!-- ========================================== -->
        <!-- MENU LATERAL (NAVEGAÇÃO)                   -->
        <!-- ========================================== -->
        <div class="w-64 bg-slate-900 text-white flex flex-col justify-between p-5 border-r border-slate-800 no-print shrink-0">
            <div>
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-blue-600 p-2 rounded-lg text-white font-bold text-xl shadow-md">LD</div>
                    <span class="text-lg font-bold tracking-wider">LABDIAG</span>
                </div>
                <nav class="space-y-2">
                    <button onclick="alternarAba('aba-dashboard')" id="btn-aba-dashboard" class="w-full flex items-center gap-3 bg-slate-800 text-blue-400 px-4 py-3 rounded-lg font-medium text-left cursor-pointer">
                        <i class="fa-solid fa-chart-pie w-5"></i> Dashboard Central
                    </button>
                    <button onclick="alternarAba('aba-tarefas')" id="btn-aba-tarefas" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer">
                        <i class="fa-solid fa-list-check w-5"></i> Quadro de Tarefas
                    </button>
                    <button onclick="alternarAba('aba-contas')" id="btn-aba-contas" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer">
                        <i class="fa-solid fa-file-invoice-dollar w-5"></i> Lançar Faturas
                    </button>
                    <button onclick="alternarAba('aba-extrato')" id="btn-aba-extrato" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer">
                        <i class="fa-solid fa-file-signature w-5"></i> Extrato de Auditoria
                    </button>
                    
                    <input type="file" id="input-importar-json" accept=".json" onchange="processarImportacaoJson(event)" class="hidden">
                    <button onclick="document.getElementById('input-importar-json').click()" class="w-full flex items-center gap-3 text-blue-400 hover:bg-blue-950/40 hover:text-blue-300 px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer mt-4 border border-blue-800/40 bg-blue-950/10">
                        <i class="fa-solid fa-upload w-5"></i> Importar DB.json
                    </button>
                    <button onclick="exportarJson()" class="w-full flex items-center gap-3 text-emerald-400 hover:bg-emerald-950/40 hover:text-emerald-300 px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer mt-2 border border-emerald-800/40 bg-emerald-950/10">
                        <i class="fa-solid fa-download w-5"></i> Exportar DB.json
                    </button>
                    <button onclick="logout()" class="w-full flex items-center gap-3 text-red-400 hover:bg-red-950/40 hover:text-red-300 px-4 py-3 rounded-lg font-medium transition-all mt-8 border-t border-slate-800/60 pt-4 text-left cursor-pointer">
                        <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Sair com Segurança
                    </button>
                </nav>
            </div>
            <div class="text-sm text-slate-500">v6.3.0 • Real dataset</div>
        </div>

        <!-- CORPO PRINCIPAL DE CONTEÚDO -->
        <div class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center shadow-sm sticky top-0 z-50 no-print shrink-0">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900" id="titulo-pagina">Métricas Analíticas e Visão Geral</h1>
                    <p class="text-sm text-slate-500" id="subtitulo-pagina">Painel integrado de gestão hospitalar - Labdiag</p>
                </div>
                <div class="w-10 h-10 bg-blue-100 text-blue-600 font-semibold rounded-full flex items-center justify-center border border-blue-200 shrink-0">RF</div>
            </header>

            <main class="p-8 space-y-6 max-w-7xl w-full mx-auto flex-1">
                
                <!-- ========================================== -->
                <!-- SEÇÃO 1: DASHBOARD CENTRAL                 -->
                <!-- ========================================== -->
                <div id="aba-dashboard" class="space-y-6 secao-sistema block">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 auto-rows-fr">
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-md h-28 flex flex-col justify-between">
                            <p class="text-xs font-semibold text-slate-400 uppercase">Total Acordado</p>
                            <h3 class="text-lg font-bold text-slate-900 mt-1" id="dash-apagar">R$ 0,00</h3>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-md h-28 flex flex-col justify-between">
                            <p class="text-xs font-semibold text-slate-400 uppercase">Total Glosado</p>
                            <h3 class="text-lg font-bold text-slate-900 mt-1" id="dash-auditado">R$ 0,00</h3>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-md h-28 flex flex-col justify-between">
                            <p class="text-xs font-semibold text-slate-400 uppercase">Total Pago Líquido</p>
                            <h3 class="text-lg font-bold text-slate-900 mt-1" id="dash-pago">R$ 0,00</h3>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-emerald-200 shadow-md bg-gradient-to-br from-emerald-50 to-white h-28 flex flex-col justify-between">
                            <p class="text-xs font-semibold text-emerald-700 uppercase">Total Recuperado</p>
                            <h3 class="text-lg font-bold text-emerald-600 mt-1" id="dash-recuperado">R$ 0,00</h3>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-red-200 shadow-md bg-gradient-to-br from-red-50 to-white h-28 flex flex-col justify-between">
                            <p class="text-xs font-semibold text-red-700 uppercase">Perda MatMed Total</p>
                            <h3 class="text-lg font-bold text-red-600 mt-1" id="dash-perda-matmed">R$ 0,00</h3>
                        </div>
                    </div>

                    <div class="bg-black border-y-2 border-blue-600 text-white text-xl font-mono py-4 tracking-wider ticker-container shadow-lg rounded-xl select-none">
                        <div class="ticker-conteudo flex items-center space-x-24" id="letreiro-bolsa"><span>Sincronizando lotes...</span></div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="bg-blue-50 text-blue-600 p-3 rounded-xl shrink-0"><i class="fa-solid fa-percent text-lg"></i></div>
                            <div><p class="text-[11px] font-bold text-slate-400 uppercase">Índice de Glosa</p><h4 class="text-base font-black text-slate-900" id="card-idx-glosa">0.0%</h4></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="bg-amber-50 text-amber-600 p-3 rounded-xl shrink-0"><i class="fa-solid fa-hourglass-half text-lg"></i></div>
                            <div><p class="text-[11px] font-bold text-slate-400 uppercase">Atraso Médio</p><h4 class="text-base font-black text-slate-900" id="card-atraso">0 dias</h4></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="bg-purple-50 text-purple-600 p-3 rounded-xl shrink-0"><i class="fa-solid fa-receipt text-lg"></i></div>
                            <div><p class="text-[11px] font-bold text-slate-400 uppercase">Ticket Médio / Conta</p><h4 class="text-base font-black text-slate-900" id="card-ticket">R$ 0,00</h4></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="bg-slate-50 text-slate-600 p-3 rounded-xl shrink-0"><i class="fa-solid fa-folder-open text-lg"></i></div>
                            <div><p class="text-[11px] font-bold text-slate-400 uppercase">Faturas em Aberto</p><h4 class="text-base font-black text-slate-900" id="card-abertas">0 faturas</h4></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center relative h-64">
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Meta Operacional: Eficiência de Glosa</h3>
                            <div class="w-full max-w-[240px] h-32 relative"><canvas id="gaugeGlosa"></canvas><div class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-center"><span class="text-2xl font-black text-slate-900" id="txt-gauge-glosa">0.0%</span></div></div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center relative h-64">
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Meta de Liquidação: Repasses Pagos</h3>
                            <div class="w-full max-w-[240px] h-32 relative"><canvas id="gaugePago"></canvas><div class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-center"><span class="text-2xl font-black text-slate-900" id="txt-gauge-pago">0.0%</span></div></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm lg:col-span-2 h-80">
                            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Evolução Mensal: Cobrado x Liberado</h3>
                            <div class="h-56 relative"><canvas id="graficoEvolucao"></canvas></div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center h-80">
                            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 w-full text-left">Representatividade por Status</h3>
                            <div class="h-56 w-full relative"><canvas id="graficoDonutStatusGeral"></canvas></div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4"><i class="fa-solid fa-list-check text-blue-600 mr-1"></i> Últimas Atividades Processadas</h3>
                        <div class="overflow-x-auto w-full">
                            <table class="w-full text-left text-xs">
                                <thead>
                                    <tr class="bg-slate-100 text-slate-500 font-bold uppercase text-[10px] border-b border-slate-200">
                                        <th class="py-2.5 px-4">Prestador</th>
                                        <th class="py-2.5 px-4 text-center">Competência</th>
                                        <th class="py-2.5 px-4 text-right">Faturado</th>
                                        <th class="py-2.5 px-4 text-right">Glosa (Auditado)</th>
                                        <th class="py-3 px-4 text-center">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="dash-movimentacoes" class="divide-y divide-slate-100 font-medium text-slate-700"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ========================================== -->
                <!-- SEÇÃO 2: QUADRO DE TAREFAS                 -->
                <!-- ========================================== -->
                <div id="aba-tarefas" class="space-y-6 secao-sistema hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs text-center">
                            <div class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Demandas Ativas</div>
                            <div class="text-xl font-extrabold text-slate-900" id="kpi-task-total">0</div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs text-center">
                            <div class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Gargalos / Travados</div>
                            <div class="text-xl font-extrabold text-red-500" id="kpi-task-stuck">0</div>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100 shadow-xs text-center">
                            <div class="text-[10px] uppercase font-bold text-emerald-600 tracking-wider">Eficiência de Entrega</div>
                            <div class="text-xl font-extrabold text-emerald-600" id="kpi-task-progress">0%</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center justify-center relative min-h-[180px]">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 text-center w-full">Velocímetro de Eficiência</h4>
                            <div class="w-full max-w-[200px] h-28 relative">
                                <canvas id="gaugeTaskProgress"></canvas>
                                <div class="absolute inset-x-0 bottom-0 flex flex-col items-center justify-center">
                                    <span class="text-xl font-black text-slate-900" id="txt-gauge-task-progress">0%</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm min-h-[180px] flex flex-col justify-between">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 w-full">Produtividade por Profissional</h4>
                            <div class="h-32 w-full relative"><canvas id="chartTaskProdutividade"></canvas></div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm min-h-[180px] flex flex-col justify-between">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 w-full">Demandas por Instância</h4>
                            <div class="h-32 w-full relative"><canvas id="chartTaskInstancia"></canvas></div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-md space-y-5">
                        <form id="form-tarefa" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <div class="lg:col-span-2">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Descrição da Atividade</label>
                                <input type="text" id="add-task-nome" required placeholder="Ex: Conciliação de glosa de materiais..." class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Fluxo / Setor</label>
                                <select id="add-task-setor" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                                    <option value="Auditoria">Auditoria</option>
                                    <option value="Faturamento">Faturamento</option>
                                    <option value="SADT">SADT</option>
                                    <option value="T.I. / Suporte">T.I. / Suporte</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Executor</label>
                                <input type="text" id="add-task-responsavel" required placeholder="Nome..." class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Supervisão / Instância</label>
                                <select id="add-task-instancia" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                                    <option value="1a Instância">1ª Instância (Auditoria Interna)</option>
                                    <option value="2a Instância">2ª Instância (Coord. Faturamento)</option>
                                    <option value="3a Instância">3ª Instância (Robson Farias)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Prazo Final</label>
                                <input type="date" id="add-task-data" required class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Prioridade</label>
                                <select id="add-task-prio" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-medium focus:outline-blue-500">
                                    <option value="Alta">Alta</option>
                                    <option value="Média" selected>Média</option>
                                    <option value="Baixa">Baixa</option>
                                </select>
                            </div>
                            <div class="lg:col-span-2 flex items-end">
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs py-2 px-4 rounded-lg shadow-sm cursor-pointer"><i class="fa-solid fa-plus mr-1"></i> Registrar</button>
                            </div>
                        </form>

                        <div class="overflow-x-auto w-full">
                            <table class="w-full min-w-[1000px] text-left border-collapse text-xs">
                                <thead>
                                    <tr class="bg-slate-100 text-slate-400 uppercase text-[9px] font-bold tracking-wider border-b border-slate-200">
                                        <th class="py-3 px-4">Setor</th>
                                        <th class="py-3 px-4">Item Operacional</th>
                                        <th class="py-3 px-4">Executor</th>
                                        <th class="py-3 px-4 text-center" style="width: 170px;">Instância</th>
                                        <th class="py-3 px-4 text-center" style="width: 120px;">Prazo</th>
                                        <th class="py-3 px-4 text-center" style="width: 110px;">Prioridade</th>
                                        <th class="py-3 px-4 text-center" style="width: 120px;">Status</th>
                                        <th class="py-3 px-4 text-center" style="width: 50px;">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="container-tarefas" class="divide-y divide-slate-100 font-medium text-slate-700"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ========================================== -->
                <!-- SEÇÃO 3: LANÇAR FATURAS                    -->
                <!-- ========================================== -->
                <div id="aba-contas" class="space-y-6 secao-sistema hidden">
                    
                    <!-- KPI TOP -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 auto-rows-fr">
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-xs flex flex-col justify-between h-20">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">A Pagar Geral</p>

    <script>
        let gaugeChartGlosa = null, gaugeChartPago = null;
        let chartEvolucao = null, chartDonutStatusGeral = null, chartDonutStatus = null;
        let gaugeTaskProgress = null, chartTaskProdutividade = null, chartTaskInstancia = null;
        let todasContasLocais = [];

        // Inicialização de cache local do motor Monday de tarefas
        let painelTarefas = JSON.parse(localStorage.getItem('monday_standalone_tasks')) || [
            { id: "tk_1", nome: "Auditoria Confirmação de Diárias", responsavel: "Ana Silva", instancia: "1a Instância", setor: "Auditoria", data: "2026-07-15", prioridade: "Alta", status: "working" },
            { id: "tk_2", nome: "Ajuste Cadastral de Tabelas TUSS", responsavel: "Carlos Lima", instancia: "2a Instância", setor: "Faturamento", data: "2026-07-20", prioridade: "Média", status: "stuck" },
            { id: "tk_3", nome: "Revisão Executiva de Glosas Críticas", responsavel: "Robson Farias", instancia: "3a Instância", setor: "Administração", data: "2026-07-05", prioridade: "Alta", status: "working" }
        ];

        if (!localStorage.getItem('db.json')) {
            localStorage.setItem('db.json', JSON.stringify({ ultimas_contas: [] }));
        }

        // ==========================================
        // MOTOR DE AUTENTICAÇÃO (SISTEMA DE LOGIN)
        // ==========================================
        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            const usuario = document.getElementById('login-user').value;
            const passe = document.getElementById('login-pass').value;
            const erroMsg = document.getElementById('erro-autenticacao');

            if (usuario === 'admin' && passe === '1234') {
                if (erroMsg) erroMsg.classList.add('hidden');
                inicializarEcossistemaProtegido();
            } else {
                if (erroMsg) erroMsg.classList.remove('hidden');
            }
        });

        function inicializarEcossistemaProtegido() {
            const blocoAuth = document.getElementById('bloco-autenticacao');
            if(blocoAuth) blocoAuth.remove();
            document.getElementById('corpo-principal').className = "bg-slate-50 font-sans text-slate-800 h-screen overflow-hidden m-0 block";

            const template = document.getElementById('template-admin').content.cloneNode(true);
            const containerSist = document.getElementById('estrutura-sistema');
            containerSist.innerHTML = '';
            containerSist.appendChild(template);
            containerSist.classList.remove('hidden');

            const scriptChart = document.createElement('script');
            scriptChart.src = "https://cdn.jsdelivr.net/npm/chart.js";
            scriptChart.onload = () => { 
                initTaskCharts();
                setTimeout(() => {
                    carregarDadosCompletos(); 
                    renderPainelTarefas();
                    mapearEventosTarefas();
                    vincularCalculoAutomatico();
                }, 100);
            };
            document.head.appendChild(scriptChart);
            mapearEventosInjetados();
        }

        window.logout = function() {
            if(confirm("Deseja encerrar sua sessão atual de forma segura?")) {
                location.reload();
            }
        }

        window.alternarAba = function(idAba) {
            document.querySelectorAll('.secao-sistema').forEach(s => s.classList.add('hidden'));
            const elAba = document.getElementById(idAba);
            if(elAba) elAba.classList.remove('hidden');
            
            // Gerenciamento visual dos botões do menu lateral
            ['btn-aba-dashboard', 'btn-aba-tarefas', 'btn-aba-contas', 'btn-aba-extrato'].forEach(btn => {
                const el = document.getElementById(btn);
                if(el) {
                    el.className = btn === `btn-${idAba}` 
                        ? "w-full flex items-center gap-3 bg-slate-800 text-blue-400 px-4 py-3 rounded-lg font-medium text-left cursor-pointer"
                        : "w-full flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-medium text-left transition-all cursor-pointer";
                }
            });
            carregarDadosCompletos();
        };

        // ==========================================
        // MOTOR 1: ENGENHARIA E CONCILIAÇÃO DE DADOS 
        // ==========================================
        function carregarDadosCompletos() {
            const db = JSON.parse(localStorage.getItem('db.json'));
            todasContasLocais = db.ultimas_contas || [];
            
            let totalFaturado = 0;   
            let totalGlosaRetido = 0;  
            let totalAcordadoPagar = 0;        
            let totalAtraso = 0;
            let qtdComAtraso = 0;
            let totalValorPagoLiquido = 0;
            let totalRecuperadoAuditoria = 0;
            let totalPerdaMatMed = 0; 
            
            let contagemStatus = { "A Pagar": 0, "Auditada": 0, "Paga": 0 };

            todasContasLocais.forEach(c => {
                const fat = parseFloat(c.valor_faturado) || 0;
                let aud = parseFloat(c.valor_auditado) || 0;
                
                // Normalização estrutural retrocompatível
                let acordo = fat - aud;
                if (c.valor_acordo !== undefined) acordo = parseFloat(c.valor_acordo);
                else if (c.valor_repasse !== undefined) acordo = parseFloat(c.valor_repasse);

                const CCusto = (c.setor || c.grupo || 'GERAL').toUpperCase().trim();
                const matmedTotal = parseFloat(c.valor_matmed_total) || 0;
                
                totalFaturado += fat;
                totalAcordadoPagar += acordo;
                totalGlosaRetido += aud; 
                
                // NOVO CÁLCULO: VALOR COBRADO (FATURADO) - VALOR ACORDO (REPASSE)
                totalRecuperadoAuditoria += (fat - acordo);
                totalPerdaMatMed += matmedTotal;

                if (c.status === "Paga" || c.status === "Pago") {
                    totalValorPagoLiquido += acordo;
                }
                if(c.atraso) {
                    totalAtraso += parseInt(c.atraso);
                    qtdComAtraso++;
                }
                if(contagemStatus[c.status] !== undefined) contagemStatus[c.status]++;
            });

            const idxGlosaGeral = totalFaturado > 0 ? ((totalGlosaRetido / totalFaturado) * 100) : 0;
            const mediaAtraso = qtdComAtraso > 0 ? Math.round(totalAtraso / qtdComAtraso) : 0;
            const ticketMedio = todasContasLocais.length > 0 ? (totalFaturado / todasContasLocais.length) : 0;
            const percentualPago = totalAcordadoPagar > 0 ? ((totalValorPagoLiquido / totalAcordadoPagar) * 100) : 0;

            // Injeta dados nas duas estruturas de KPIs de forma segura
            const mapeamentoValores = {
                'dash-apagar': totalAcordadoPagar, 'anexo-apagar': totalAcordadoPagar,
                'dash-auditado': totalGlosaRetido, 'anexo-auditado': totalGlosaRetido,
                'dash-pago': totalValorPagoLiquido, 'anexo-pago': totalValorPagoLiquido,
                'dash-recuperado': totalRecuperadoAuditoria, 'anexo-recuperado': totalRecuperadoAuditoria,
                'dash-perda-matmed': totalPerdaMatMed
            };

            for(let [id, val] of Object.entries(mapeamentoValores)){
                let el = document.getElementById(id);
                if(el) el.innerText = 'R$ ' + val.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            }

            if(document.getElementById('card-idx-glosa')) document.getElementById('card-idx-glosa').innerText = idxGlosaGeral.toFixed(1) + '%';
            if(document.getElementById('card-atraso')) document.getElementById('card-atraso').innerText = mediaAtraso + ' dias';
            if(document.getElementById('card-ticket')) document.getElementById('card-ticket').innerText = 'R$ ' + ticketMedio.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            if(document.getElementById('card-abertas')) document.getElementById('card-abertas').innerText = contagemStatus['A Pagar'] + ' faturas';

            // Ticker Letreiro Digital
            let stringTicker = "";
            todasContasLocais.slice(0, 5).forEach(c => {
                stringTicker += `<span class="inline-flex items-center space-x-2"><span class="text-slate-300 font-bold uppercase">${c.prestador}:</span><span class="text-emerald-400 font-medium neon-text-green">▲ COBRADO R$ ${c.valor_faturado.toLocaleString('pt-BR', {maximumFractionDigits:0})}</span></span> &nbsp;&nbsp;&nbsp;&nbsp;`;
            });
            if(document.getElementById('letreiro-bolsa')) document.getElementById('letreiro-bolsa').innerHTML = stringTicker || "<span>Painel sincronizado.</span>";

            renderizarGauges(idxGlosaGeral, percentualPago);
            renderizarGraficosCompletos(contagemStatus, totalAcordadoPagar, totalGlosaRetido, totalValorPagoLiquido);
            renderizarTabelaHistorial();
            filtrarExtratoExclusivo();
        }

        function vincularCalculoAutomatico() {
            const faturado = document.getElementById('form-faturado');
            const auditado = document.getElementById('form-auditado');
            const acordo = document.getElementById('form-acordo');
            if(!faturado || !auditado) return;
            const calc = () => { acordo.value = (Math.max(0, (parseFloat(faturado.value) || 0) - (parseFloat(auditado.value) || 0))).toFixed(2); };
            faturado.addEventListener('input', calc);
            auditado.addEventListener('input', calc);
        }

        function renderizarGauges(glosa, pago) {
            if(!window.Chart || !document.getElementById('gaugeGlosa')) return;
            const opt = { responsive: true, maintainAspectRatio: false, rotation: -90, circumference: 180, plugins: { legend: { display: false } }, cutout: '80%' };
            if (gaugeChartGlosa) gaugeChartGlosa.destroy();
            gaugeChartGlosa = new Chart(document.getElementById('gaugeGlosa').getContext('2d'), { type: 'doughnut', data: { datasets: [{ data: [glosa, Math.max(0, 100 - glosa)], backgroundColor: ['#3b82f6', '#e2e8f0'], borderWidth: 0 }] }, options: opt });
            if (gaugeChartPago) gaugeChartPago.destroy();
            gaugeChartPago = new Chart(document.getElementById('gaugePago').getContext('2d'), { type: 'doughnut', data: { datasets: [{ data: [pago, Math.max(0, 100 - pago)], backgroundColor: ['#10b981', '#e2e8f0'], borderWidth: 0 }] }, options: opt });
        }

        function renderizarGraficosCompletos(stData, apagar, auditado, pago) {
            if(!window.Chart) return;
            // Gráfico de Linha da Home
            if(document.getElementById('graficoEvolucao')){
                if (chartEvolucao) chartEvolucao.destroy();
                chartEvolucao = new Chart(document.getElementById('graficoEvolucao').getContext('2d'), { type: 'line', data: { labels: ['Histórico Inicial', 'Competência Corrente'], datasets: [{ label: 'Cobrado', data: [124003, apagar + auditado], borderColor: '#cbd5e1', fill: false }, { label: 'Liberado', data: [112842, apagar], borderColor: '#2563eb', fill: true }] }, options: { responsive: true, maintainAspectRatio: false } });
            }
            // Donut Geral da Home
            if(document.getElementById('graficoDonutStatusGeral')){
                if (chartDonutStatusGeral) chartDonutStatusGeral.destroy();
                chartDonutStatusGeral = new Chart(document.getElementById('graficoDonutStatusGeral').getContext('2d'), { type: 'doughnut', data: { labels: ['A Pagar', 'Auditado', 'Pago'], datasets: [{ data: [stData["A Pagar"], stData["Auditada"], stData["Paga"]], backgroundColor: ['#f59e0b', '#3b82f6', '#10b981'] }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '75%' } });
            }
            // Donut Exclusivo da Aba Lançar Faturas (Lado a lado com formulário)
            if(document.getElementById('graficoDonutStatus')){
                if (chartDonutStatus) chartDonutStatus.destroy();
                chartDonutStatus = new Chart(document.getElementById('graficoDonutStatus').getContext('2d'), { type: 'doughnut', data: { labels: ['A Pagar', 'Auditado', 'Pago'], datasets: [{ data: [apagar, auditado, pago], backgroundColor: ['#fdab3d', '#3b82f6', '#00c875'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '70%' } });
            }
        }

        function renderizarTabelaHistorial() {
            const corpo = document.getElementById('tabela-extrato');
            const corpoDash = document.getElementById('dash-movimentacoes');
            if(!corpo) return;

            if(todasContasLocais.length === 0){
                corpo.innerHTML = `<tr><td colspan="10" class="py-6 text-center text-slate-400">Nenhum registro encontrado no sistema.</td></tr>`;
                if(corpoDash) corpoDash.innerHTML = `<tr><td colspan="5" class="py-4 text-center">Nenhum registro.</td></tr>`;
                return;
            }

            let htmlString = "";
            let htmlDash = "";
            todasContasLocais.forEach(c => {
                const fat = parseFloat(c.valor_faturado) || 0;
                const aud = parseFloat(c.valor_auditado) || 0;
                const aco = fat - aud;
                const mat = parseFloat(c.valor_matmed_total) || 0;

                htmlString += `<tr class="hover:bg-slate-50 border-b border-slate-100 text-[11px]">
                    <td class="py-3 px-4 text-center font-mono">${c.competencia}</td>
                    <td class="py-3 px-4 font-bold text-slate-900">${c.prestador}</td>
                    <td class="py-3 px-4 text-slate-500">${c.setor || 'GERAL'} / ${c.grupo || 'GERAL'}</td>
                    <td class="py-3 px-4 text-right font-mono">R$ ${fat.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3 px-4 text-right font-mono text-blue-600">R$ ${aud.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3 px-4 text-right font-mono text-slate-900">R$ ${aco.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3 px-4 text-right font-mono text-purple-600">R$ ${mat.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="py-3 px-4 text-center">${c.atraso ? c.atraso + ' dias' : '-'}</td>
                    <td class="py-3 px-4 text-center"><span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold text-[10px]">${c.status}</span></td>
                    <td class="py-3 px-4 text-center no-print space-x-2">
                        <button onclick="prepararEdicao('${c.timestamp}')" class="text-blue-600 hover:text-blue-800"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deletarFaturaDirect('${c.timestamp}')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-square-xmark"></i></button>
                    </td>
                </tr>`;

                htmlDash += `<tr class="border-b border-slate-100"><td class="py-2 px-4 font-bold">${c.prestador}</td><td class="py-2 px-4 text-center font-mono">${c.competencia}</td><td class="py-2 px-4 text-right font-mono">R$ ${fat.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td><td class="py-2 px-4 text-right font-mono text-red-500">R$ ${aud.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td><td class="py-2 px-4 text-center"><span class="text-[10px] font-bold bg-slate-100 px-2 py-0.5 rounded">${c.status}</span></td></tr>`;
            });
            corpo.innerHTML = htmlString;
            if(corpoDash) corpoDash.innerHTML = htmlDash;
        }

        function filtrarExtratoExclusivo() {
            const fNome = document.getElementById('filtro-nome')?.value.toLowerCase() || '';
            const corpo = document.getElementById('tabela-extrato-geral');
            if(!corpo) return;

            const filtradas = todasContasLocais.filter(c => c.prestador.toLowerCase().includes(fNome));
            corpo.innerHTML = filtradas.map(c => {
                const fat = parseFloat(c.valor_faturado) || 0;
                const aud = parseFloat(c.valor_auditado) || 0;
                return `<tr class="border-b border-slate-100 hover:bg-slate-50"><td class="py-3 px-4 text-center font-mono">${c.competencia}</td><td class="py-3 px-4 font-bold">${c.prestador}</td><td class="py-3 px-4 text-right font-mono">R$ ${fat.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td><td class="py-3 px-4 text-right font-mono text-blue-600">R$ ${aud.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td><td class="py-3 px-4 text-right font-mono">R$ ${(fat - aud).toLocaleString('pt-BR', {minimumFractionDigits:2})}</td><td class="py-3 px-4 text-center"><span class="px-2 py-0.5 bg-amber-50 font-bold rounded text-[10px]">${c.status}</span></td></tr>`;
            }).join('');
        }

        function mapearEventosInjetados() {
            document.getElementById('form-conciliacao').addEventListener('submit', (e) => {
                e.preventDefault();
                let db = JSON.parse(localStorage.getItem('db.json')) || { ultimas_contas: [] };
                
                const novaConta = {
                    timestamp: document.getElementById('conta-timestamp').value || 'ts_' + Date.now(),
                    competencia: document.getElementById('form-competencia').value,
                    prestador: document.getElementById('form-prestador').value.toUpperCase(),
                    setor: document.getElementById('form-setor').value.toUpperCase() || 'GERAL',
                    grupo: document.getElementById('form-grupo').value.toUpperCase() || 'GERAL',
                    valor_faturado: parseFloat(document.getElementById('form-faturado').value) || 0,
                    valor_auditado: parseFloat(document.getElementById('form-auditado').value) || 0,
                    valor_matmed_total: parseFloat(document.getElementById('form-matmed-total').value) || 0,
                    atraso: parseInt(document.getElementById('form-atraso').value) || 0,
                    status: document.getElementById('form-status').value
                };

                const idx = db.ultimas_contas.findIndex(c => c.timestamp === novaConta.timestamp);
                if(idx !== -1) db.ultimas_contas[idx] = novaConta; else db.ultimas_contas.unshift(novaConta);
                
                localStorage.setItem('db.json', JSON.stringify(db));
                limparFormulario(); carregarDadosCompletos();
            });
        }

        window.prepararEdicao = function(ts) {
            const c = todasContasLocais.find(x => x.timestamp === ts); if (!c) return;
            document.getElementById('conta-timestamp').value = c.timestamp;
            document.getElementById('form-competencia').value = c.competencia;
            document.getElementById('form-atraso').value = c.atraso || 0;
            document.getElementById('form-prestador').value = c.prestador;
            document.getElementById('form-setor').value = c.setor || '';
            document.getElementById('form-grupo').value = c.grupo || '';
            document.getElementById('form-faturado').value = c.valor_faturado;
            document.getElementById('form-auditado').value = c.valor_auditado || 0;
            document.getElementById('form-matmed-total').value = c.valor_matmed_total || 0;
            document.getElementById('form-status').value = c.status;
            
            // Força o recálculo do campo Repasse (que é apenas leitura) no formulário de edição
            document.getElementById('form-faturado').dispatchEvent(new Event('input'));
            document.getElementById('form-titulo').innerText = "Editando Registro Ativo";
        };

        window.limparFormulario = function() { 
            document.getElementById('form-conciliacao')?.reset(); 
            document.getElementById('conta-timestamp').value = '';
            document.getElementById('form-titulo').innerText = "Lançamento e Conciliação";
        };

        window.deletarFaturaDirect = function(ts) {
            let db = JSON.parse(localStorage.getItem('db.json'));
            if(confirm("Deseja deletar essa fatura permanentemente?")) {
                db.ultimas_contas = db.ultimas_contas.filter(x => x.timestamp !== ts);
                localStorage.setItem('db.json', JSON.stringify(db));
                carregarDadosCompletos();
            }
        };

        // ==========================================
        // MOTOR 2: QUADRO DE TAREFAS ESTILO MONDAY   
        // ==========================================
        window.renderPainelTarefas = function() {
            const tbody = document.getElementById('container-tarefas');
            if(!tbody) return; tbody.innerHTML = '';
            
            painelTarefas.forEach(t => {
                let cStatus = "status-working";
                if(t.status === "done") cStatus = "status-done";
                if(t.status === "stuck") cStatus = "status-stuck";
                if(t.status === "backlog") cStatus = "status-backlog";

                let cPrio = "priority-medium";
                if(t.prioridade === "Alta") cPrio = "priority-high";
                if(t.prioridade === "Baixa") cPrio = "priority-low";

                tbody.innerHTML += `<tr class="border-b border-slate-100 hover:bg-slate-50 transition-all text-xs">
                    <td class="py-2.5 px-4"><span class="bg-slate-200 text-slate-700 px-2 py-0.5 rounded uppercase font-bold text-[10px]">${t.setor}</span></td>
                    <td class="py-2.5 px-4 font-bold text-slate-900">${t.nome}</td>
                    <td class="py-2.5 px-4">${t.responsavel}</td>
                    <td class="py-2.5 px-4 text-center">${t.instancia}</td>
                    <td class="py-2.5 px-4 text-center font-mono">${t.data}</td>
                    <td class="py-2.5 px-4 text-center"><span class="${cPrio} text-white px-2 py-0.5 rounded text-[10px] font-bold uppercase">${t.prioridade}</span></td>
                    <td class="py-2.5 px-4 text-center">
                        <select onchange="atualizarStatusTarefa('${t.id}', this.value)" class="monday-select ${cStatus} px-2 py-1 rounded text-[11px] font-bold w-28 text-center focus:outline-none">
                            <option value="working" ${t.status === 'working' ? 'selected' : ''}>Trabalhando</option>
                            <option value="done" ${t.status === 'done' ? 'selected' : ''}>Feito</option>
                            <option value="stuck" ${t.status === 'stuck' ? 'selected' : ''}>Travado</option>
                            <option value="backlog" ${t.status === 'backlog' ? 'selected' : ''}>Backlog</option>
                        </select>
                    </td>
                    <td class="py-2.5 px-4 text-center"><button onclick="deleteTaskDirect('${t.id}')" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button></td>
                </tr>`;
            });
            calculateTaskMetrics(); updateTaskCharts();
        };

        window.mapearEventosTarefas = function() {
            document.getElementById('form-tarefa')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const nt = {
                    id: 'tk_' + Date.now(),
                    nome: document.getElementById('add-task-nome').value,
                    setor: document.getElementById('add-task-setor').value,
                    responsavel: document.getElementById('add-task-responsavel').value,
                    instancia: document.getElementById('add-task-instancia').value,
                    data: document.getElementById('add-task-data').value,
                    prioridade: document.getElementById('add-task-prio').value,
                    status: 'working'
                };
                painelTarefas.push(nt);
                localStorage.setItem('monday_standalone_tasks', JSON.stringify(painelTarefas));
                document.getElementById('form-tarefa').reset();
                renderPainelTarefas();
            });
        };

        window.atualizarStatusTarefa = function(id, st) {
            let t = painelTarefas.find(x => x.id === id);
            if(t) { t.status = st; localStorage.setItem('monday_standalone_tasks', JSON.stringify(painelTarefas)); renderPainelTarefas(); }
        };

        window.deleteTaskDirect = function(id) {
            if(confirm("Excluir essa tarefa permanentemente?")) {
                painelTarefas = painelTarefas.filter(x => x.id !== id);
                localStorage.setItem('monday_standalone_tasks', JSON.stringify(painelTarefas));
                renderPainelTarefas();
            }
        };

        function calculateTaskMetrics() {
            const tot = painelTarefas.length; 
            const done = painelTarefas.filter(t => t.status === 'done').length;
            const stuck = painelTarefas.filter(t => t.status === 'stuck').length;
            const pct = tot > 0 ? Math.round((done / tot) * 100) : 0;
            if(document.getElementById('kpi-task-total')) document.getElementById('kpi-task-total').innerText = tot;
            if(document.getElementById('kpi-task-stuck')) document.getElementById('kpi-task-stuck').innerText = stuck;
            if(document.getElementById('kpi-task-progress')) document.getElementById('kpi-task-progress').innerText = `${pct}%`;
            if(document.getElementById('txt-gauge-task-progress')) document.getElementById('txt-gauge-task-progress').innerText = `${pct}%`;
        }

        function initTaskCharts() {
            if(!document.getElementById('gaugeTaskProgress')) return;
            gaugeTaskProgress = new Chart(document.getElementById('gaugeTaskProgress').getContext('2d'), { type: 'doughnut', data: { datasets: [{ data: [0, 100], backgroundColor: ['#00c875', '#e2e8f0'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, rotation: -90, circumference: 180, cutout: '80%' } });
            chartTaskProdutividade = new Chart(document.getElementById('chartTaskProdutividade').getContext('2d'), { type: 'bar', data: { labels: ['Ana', 'Carlos', 'Robson'], datasets: [{ data: [1, 1, 1], backgroundColor: '#0284c7' }] }, options: { responsive: true, maintainAspectRatio: false } });
            chartTaskInstancia = new Chart(document.getElementById('chartTaskInstancia').getContext('2d'), { type: 'doughnut', data: { labels: ['1ª Inst.', '2ª Inst.', '3ª Inst.'], datasets: [{ data: [1, 1, 1], backgroundColor: ['#0284c7', '#0f766e', '#1e1b4b'] }] }, options: { responsive: true, maintainAspectRatio: false } });
        }

        function updateTaskCharts() {
            if(!gaugeTaskProgress) return;
            const tot = painelTarefas.length; const done = painelTarefas.filter(t => t.status === 'done').length;
            gaugeTaskProgress.data.datasets[0].data = [done, Math.max(0, tot - done)]; gaugeTaskProgress.update();
        }

        // Importação e exportação de backups do sistema
        window.exportarJson = function() { const db = JSON.parse(localStorage.getItem('db.json')); const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'db.json'; a.click(); };
        window.processarImportacaoJson = function(e) { const f = e.target.files[0]; if (!f) return; const reader = new FileReader(); reader.onload = function(evt) { try { const parsed = JSON.parse(evt.target.result); if(parsed && parsed.ultimas_contas) { localStorage.setItem('db.json', JSON.stringify(parsed)); carregarDadosCompletos(); alert('Dados importados!'); } }catch(err){alert('Arquivo inválido.');} }; reader.readAsText(f); };
    </script>
</body>
</html>
